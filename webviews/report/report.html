<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadSweep Report</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #eee; padding: 24px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center; margin-bottom: 32px; padding: 32px;
            background: linear-gradient(135deg, #16213e, #0f3460); border-radius: 12px;
        }
        .header h1 { font-size: 36px; margin-bottom: 8px; }
        .header .subtitle { color: #aaa; font-size: 16px; }
        .section { margin: 32px 0; }
        .section h2 { font-size: 20px; margin-bottom: 16px; color: #C0392B; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #2a2a4a; }
        th { background: #16213e; color: #C0392B; font-weight: 600; }
        .footer {
            text-align: center; margin-top: 48px; padding-top: 24px;
            border-top: 1px solid #2a2a4a; color: #666; font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧹 DeadSweep Report</h1>
            <div class="subtitle">Dead Code Analysis Results</div>
        </div>
        <div class="section" id="reportContent">
            <p>Report content will be populated dynamically.</p>
        </div>
        <div class="footer">
            Generated by DeadSweep v1.0.0
        </div>
    </div>
</body>
</html>
